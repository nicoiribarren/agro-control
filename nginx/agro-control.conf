# Nginx reverse proxy para Agro Control
# Reemplazá TU_DOMINIO_O_IP por tu IP o dominio real
# Ubicar en: /etc/nginx/sites-available/agro-control
# Activar con: sudo ln -s /etc/nginx/sites-available/agro-control /etc/nginx/sites-enabled/

server {
    listen 80;
    listen [::]:80;
    server_name TU_DOMINIO_O_IP;

    access_log /var/log/nginx/agro-control.access.log;
    error_log  /var/log/nginx/agro-control.error.log warn;

    # Compresión gzip
    gzip            on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied    any;
    gzip_types
        text/plain text/css text/javascript
        application/json application/javascript
        application/x-javascript image/svg+xml;

    # Proxy hacia Node.js / Express (sirve API + React build)
    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts razonables para una app de balanza
        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }

    # Cache de assets estáticos (JS/CSS con hash en el nombre)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        expires    30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Seguridad básica
    add_header X-Frame-Options       "SAMEORIGIN"  always;
    add_header X-Content-Type-Options "nosniff"    always;
    add_header Referrer-Policy       "no-referrer" always;
}

